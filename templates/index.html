<!DOCTYPE html>
<html>
<head>
    <title>OptiCrop</title>
    <style>
        body{
            font-family:Arial;
            background:#e8f5e9;
            text-align:center;
        }
        .container{
            width:400px;
            margin:auto;
            margin-top:30px;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }
        input{
            width:90%;
            padding:10px;
            margin:8px;
        }
        button{
            padding:10px 20px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
        }
        h3{
            color:green;
        }
    </style>
</head>
<body>
    
<div class="container">
    <h2>OptiCrop - Crop Recommendation System</h2>

    <form action="/predict" method="post">

        <input type="number" name="N" placeholder="Nitrogen" required>

        <input type="number" name="P" placeholder="Phosphorous" required>

        <input type="number" name="K" placeholder="Potassium" required>

        <input type="number" step="any" name="temperature" placeholder="Temperature" required>

        <input type="number" step="any" name="humidity" placeholder="Humidity" required>

        <input type="number" step="any" name="ph" placeholder="pH Value" required>

        <input type="number" step="any" name="rainfall" placeholder="Rainfall" required>

        <button type="submit">Predict Crop</button>

    </form>

    <h3>{{ prediction_text }}</h3>

</div>

</body>
</html>
